{% extends 'ci_cd/base.html' %}

{% block content %}

<div class="add-test-file-container">
    <h2 class="add-test-file-heading">Add Test File</h2>
    <form method="POST" class="add-test-file-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Add Test File</button>
    </form>
</div>

<style>
    /* Add Test File Page Styles */
    .add-test-file-container {
        width: 90%;
        max-width: 800px;
        margin: 50px auto;
        background-color: #1e1e1e;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
    }

    /* Form Styles */
    .add-test-file-form {
        display: flex;
        flex-direction: column;
        gap: 20px;
    }

    .add-test-file-form input[type="text"],
    .add-test-file-form textarea {
        background-color: #2a2a2a;
        color: #ffffff;
        padding: 15px;
        border: 1px solid #444444;
        border-radius: 5px;
        font-size: 14px;
        resize: vertical;
    }

    .add-test-file-form button[type="submit"] {
        background-color: #4caf50;
        color: #ffffff;
        border: none;
        padding: 15px;
        border-radius: 5px;
        cursor: pointer;
        transition: background-color 0.3s;
        font-weight: bold;
    }

    .add-test-file-form button[type="submit"]:hover {
        background-color: #388e3c;
    }

    /* Headings */
    .add-test-file-heading {
        color: #ffffff;
        text-align: center;
        margin-bottom: 20px;
        font-size: 24px;
    }

    /* Messages */
    .add-test-file-message-success {
        background-color: #388e3c;
        color: #ffffff;
        padding: 10px;
        border-radius: 5px;
        margin-bottom: 20px;
        text-align: center;
        font-weight: bold;
    }

    .add-test-file-message-error {
        background-color: #d32f2f;
        color: #ffffff;
        padding: 10px;
        border-radius: 5px;
        margin-bottom: 20px;
        text-align: center;
        font-weight: bold;
    }

    /* Links */
    .add-test-file-link {
        color: #4caf50;
        text-decoration: none;
        font-weight: bold;
    }

    .add-test-file-link:hover {
        color: #388e3c;
        text-decoration: underline;
    }
</style>
{% endblock %}
